<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bauducco — Produtos | Oroleite</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/img/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/logo.png" />
    <link rel="apple-touch-icon" href="/img/logo.png" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">&larr; Voltar</a>
    </div>
  </header>

  <main class="container">
    <section class="section section--brand">
      <h2 class="section__title">
        <img src="/img/icons/bauducco.png" alt="Bauducco">
        <!-- <span class="visually-hidden">Bauducco</span> -->
      </h2>
      <div class="brand-subgroup">
      <div class="products-grid">
        <!-- autogenerated grid start -->
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962051338_99_1_1200_72_SRGB.png" alt="Bauducco Pão Tradicional" data-desc="" /><div class="product-overlay"><h4>Bauducco Pão Tradicional</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962051345_99_1_1200_72_SRGB.png" alt="Bauducco Pão 36% Integral" data-desc="" /><div class="product-overlay"><h4>Bauducco Pão 36% Integral</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962063874_99_1_1200_72_SRGB.png" alt="Bauducco Bisnaguinha Tradicional" data-desc="" /><div class="product-overlay"><h4>Bauducco Bisnaguinha Tradicional</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962064048_99_1_1200_72_SRGB.png" alt="Bauducco Biscoito 36% Integral" data-desc="" /><div class="product-overlay"><h4>Bauducco Biscoito 36% Integral</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962064055_99_1_1200_72_SRGB.png" alt="Bauducco Biscoito Integral" data-desc="" /><div class="product-overlay"><h4>Bauducco Biscoito Integral</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962067278_99_1_1200_72_SRGB.png" alt="Bauducco Broa de Mel" data-desc="" /><div class="product-overlay"><h4>Bauducco Broa de Mel</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962069913_99_4_1200_72_SRGB.png" alt="Bauducco Bolo de Chocolate" data-desc="" /><div class="product-overlay"><h4>Bauducco Bolo de Chocolate</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962069920_99_4_1200_72_SRGB.png" alt="Bauducco Bolo de Milho" data-desc="" /><div class="product-overlay"><h4>Bauducco Bolo de Milho</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962071879_99_1_1200_72_SRGB.png" alt="Bauducco Biscoito Doce" data-desc="" /><div class="product-overlay"><h4>Bauducco Biscoito Doce</h4></div></div></div>
        <div class="product-card"><div class="product-media"><img src="../icons/Bauducco/7891962077321_99_1_1200_72_SRGB.png" alt="Bauducco Panettone" data-desc="" /><div class="product-overlay"><h4>Bauducco Panettone</h4></div></div></div>
        </div>
        <!-- autogenerated grid end -->
      </div>
      <div class="carousel">
        <div class="carousel-container">
          <div class="carousel-item active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png" alt="Exemplo 1">
          </div>
          <div class="carousel-item">
            <img src="https://www.w3schools.com/w3css/img_lights.jpg" alt="Exemplo 2">
          </div>
          <div class="carousel-item">
            <img src="https://www.w3schools.com/w3css/img_mountains.jpg" alt="Exemplo 3">
          </div>
        </div>
        <button class="carousel-control prev">&#10094;</button>
        <button class="carousel-control next">&#10095;</button>
      </div>

      <style>
        .carousel {
          position: relative;
          width: 100%;
          max-width: 1000px;
          margin: 40px auto 0 auto;
          overflow: hidden;
          height: 500px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: none;
          border-radius: 0;
          box-shadow: none;
        }
        .carousel-container {
          width: 100%;
          height: 100%;
          position: relative;
        }
        .carousel-item {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          opacity: 0;
          transition: opacity 0.5s;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .carousel-item.active {
          opacity: 1;
          z-index: 1;
        }
        .carousel-item img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          border-radius: 0;
          box-shadow: none;
        }
        .carousel-control {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          background-color: rgba(0, 0, 0, 0.5);
          color: white;
          border: none;
          padding: 10px 16px;
          cursor: pointer;
          z-index: 2;
          font-size: 32px;
          border-radius: 50%;
          transition: background 0.2s;
        }
        .carousel-control.prev {
          left: 16px;
        }
        .carousel-control.next {
          right: 16px;
        }
        .carousel-control:hover {
          background-color: rgba(0, 0, 0, 0.8);
        }
      </style>

      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const items = document.querySelectorAll('.carousel-item');
          const prevButton = document.querySelector('.carousel-control.prev');
          const nextButton = document.querySelector('.carousel-control.next');
          let currentIndex = 0;
          function updateCarousel() {
            items.forEach((item, idx) => {
              item.classList.toggle('active', idx === currentIndex);
            });
          }
          prevButton.addEventListener('click', () => {
            currentIndex = (currentIndex > 0) ? currentIndex - 1 : items.length - 1;
            updateCarousel();
          });
          nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex < items.length - 1) ? currentIndex + 1 : 0;
            updateCarousel();
          });
          updateCarousel();
        });
      </script>
    </section>
  </main>
  <script src="../scripts/normalizeTitles.js" defer></script>
</body>
</html>
