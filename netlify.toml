[build]
  publish = "."

[context.production]
  command = ""
  publish = "."

[deploy]
  # deploy branch left empty to allow Netlify UI to control it; creating 'main' branch to match Netlify defaults

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.ipify.org; frame-ancestors 'none';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
